apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/infrastructure/core/controllers
  prune: true
  deletionPolicy: WaitForTermination
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
