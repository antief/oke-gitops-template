apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/infrastructure/core/configs
  prune: true
  deletionPolicy: WaitForTermination
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-controllers
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
